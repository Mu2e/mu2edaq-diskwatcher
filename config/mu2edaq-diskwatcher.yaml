# diskwatcher.yaml — mu2edaq disk watcher configuration
#
# Values in the "watcher" section are defaults.  Any setting can be
# overridden on the command line (e.g. --port 8080 overrides watcher.web_port).
# If this file is absent, the hardcoded defaults in diskwatcher.py are used.

watcher:
  web_host:      "0.0.0.0"   # Bind address for the Flask web server
  web_port:      5002         # HTTP port for the dashboard
  poll_interval: 30           # Seconds between mtime checks
  daemon:        false        # Set to true to run as a background daemon (POSIX only)
  pid_file:      "./config/mu2edaq-diskwatcher.pid"   # PID file written when daemon: true
  log_file:      "./config/mu2edaq-diskwatcher.log"   # Log file written when daemon: true

# Individual files to watch.
# Each entry requires a "path" (absolute or relative) and a "delay"
# (staleness threshold in seconds).  An optional "label" is shown in the
# dashboard instead of the raw path.
files:
  - path:  /tmp/diskwatcher-example.txt  # Example stale file
    delay: 60          # flag as stale if not written within 1 minutes
    label: "Example file (tmp)"

  - path:  /var/log/system.log  # Example updating file
    delay: 3600         # flag as stale if not written within 1 hour
    label: "System log"

  - path:  /home/mu2edaq/myfile.txt  # Example of remote file
    delay: 600          # flag as stale if not written within 10 minutes
    label: "Example Remote File"
    ssh:
      host: mu2edaq@mu2edaq13.fnal.gov

  - path:  /Users/anorman/data/latest.dat  # Example of local file
    delay: 300          # flag as stale if not written within 5 minutes
    label: "Latest data (local)"

  # Remote file accessed via SSH.  The "ssh" block is optional; omit it for
  # local paths.  All ssh sub-keys except "host" are optional.
  #- path:  /data/mu2e/run_latest.dat
  #  delay: 120
  #  label: "Latest run data (remote)"
  #  ssh:
  #    host:    daq-node01.example.com   # required — remote hostname or IP
  #    port:    22                        # SSH port (default: 22)
  #    key:     ~/.ssh/id_ed25519        # private key file (default: SSH agent / ~/.ssh/id_rsa)
  #    timeout: 10                        # connection+command timeout in seconds (default: 10)
  #    options:                           # extra ssh -o Key=Value pairs
  #      - StrictHostKeyChecking=no


# Directories to watch.
# The mtime of a directory changes when files are added or removed.
# To detect writes to files *inside* the directory, list those files
# individually in the "files" section above.
paths:
  - path:  /tmp
    delay: 600                        # flag as stale if the directory has not changed in 10 minutes
    label: "Temp directory"
  - path: /Users/anorman/data         # Should be a missing dir
    delay: 300                        # flag as stale if the directory has not changed in 1 hour
    label: "Main Data directory"

  # Remote directory accessed via SSH.
  - path:  /home
    delay: 600
    label: "Home on DAQ13"
    ssh:
      host:    mu2edaq@mu2edaq13.fnal.gov
  #    key:     ~/.ssh/id_ed25519
  #    timeout: 15
